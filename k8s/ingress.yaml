apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spring-gitops-demo-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - spring-gitops-demo.example.com
      secretName: spring-gitops-demo-tls
  rules:
    - host: spring-gitops-demo.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spring-gitops-demo-service
                port:
                  number: 80

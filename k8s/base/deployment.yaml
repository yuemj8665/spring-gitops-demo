apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-gitops-demo
  labels:
    app: spring-gitops-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-gitops-demo
  template:
    metadata:
      labels:
        app: spring-gitops-demo
    spec:
      containers:
        - name: spring-gitops-demo
          image: spring-gitops-demo:latest  # ArgoCD Image Updater 또는 CI에서 교체
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: spring-gitops-demo-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5

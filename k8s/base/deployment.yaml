apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-practice
  labels:
    app: java-practice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-practice
  template:
    metadata:
      labels:
        app: java-practice
    spec:
      containers:
        - name: java-practice
          image: java-practice:latest  # ArgoCD Image Updater 또는 CI에서 교체
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: java-practice-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5

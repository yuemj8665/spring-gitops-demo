apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: java-practice-dev

namePrefix: dev-

resources:
  - ../../base

# 이미지 태그 오버라이드 (로컬 Docker 이미지 사용)
images:
  - name: java-practice
    newName: java-practice_20260125
    newTag: latest

# ConfigMap 패치
configMapGenerator:
  - name: java-practice-config
    behavior: merge
    literals:
      - APP_MESSAGE=Hello from DEV!
      - SPRING_PROFILES_ACTIVE=dev

# 레플리카 수 조정
replicas:
  - name: java-practice
    count: 1

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: java-practice-project
  namespace: argocd
spec:
  description: Java Practice Application Project
  
  # 허용되는 소스 저장소
  sourceRepos:
    - https://gitlab.com/your-group/java-practice.git
  
  # 허용되는 배포 대상
  destinations:
    - namespace: java-practice
      server: https://kubernetes.default.svc
    - namespace: java-practice-dev
      server: https://kubernetes.default.svc
    - namespace: java-practice-prod
      server: https://kubernetes.default.svc
  
  # 허용되는 클러스터 리소스
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  
  # 허용되는 네임스페이스 리소스
  namespaceResourceWhitelist:
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: apps
      kind: Deployment
    - group: networking.k8s.io
      kind: Ingress
